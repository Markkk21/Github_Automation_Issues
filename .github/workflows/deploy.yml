name: Deploy to GitHub Pages

on:
  # Triggers the workflow anytime you push changes to your main branch
  push:
    branches: ["master"]

  # Allows you to manually trigger this workflow from the Actions tab if needed
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup GitHub Pages Infrastructure
        uses: actions/configure-pages@v5

      - name: Upload Static Files Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the entire repository directory (since index.html is at the root)
          path: '.'

      - name: Deploy to GitHub Pages Live Site
        id: deployment
        uses: actions/deploy-pages@v4