<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel to GitHub Issue Importer</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h2>Excel to GitHub Issue Importer</h2>
    <p>Fill out your repository configurations, then drop your tracker spreadsheet below.</p>
    <hr>

    <div class="form-group">
        <label for="token">GitHub Personal Access Token (PAT):</label>
        <input type="password" id="token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
    </div>
    <div class="form-group">
        <label for="owner">Repository Owner (Username or Org):</label>
        <input type="text" id="owner" placeholder="e.g., octocat">
    </div>
    <div class="form-group">
        <label for="repo">Repository Name:</label>
        <input type="text" id="repo" placeholder="e.g., hello-world">
    </div>

    <div id="drop-zone">Drag & Drop your Excel file (.xlsx or .csv) here</div>

    <div id="preview-section">
        <div class="preview-header">
            <h4 class="preview-title" id="preview-count">Staged Rows Data Preview</h4>
            <button id="import-btn" class="primary-btn">Import to GitHub</button>
        </div>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Body</th>
                        <th>Labels</th>
                        <th>Assignee</th>
                    </tr>
                </thead>
                <tbody id="preview-body">
                    </tbody>
            </table>
        </div>
    </div>

    <div class="log-header-container">
        <h3>Process Log:</h3>
        <button id="clear-btn" class="clear-btn">Clear Logs</button>
    </div>
    
    <div id="log"><div class="system">[System] Engine initialization complete. Clear to upload.</div></div>

    <script src="app.js"></script>
</body>
</html>
